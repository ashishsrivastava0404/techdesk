<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="gradDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#0f172a"/>
  
  <!-- Star/Ladder icon representing promotion -->
  <g transform="translate(256, 256)">
    <!-- Left side of ladder -->
    <path d="M-80 180 L-80 -120" stroke="url(#gradDark)" stroke-width="16" stroke-linecap="round" fill="none"/>
    <!-- Right side of ladder -->
    <path d="M80 180 L80 -120" stroke="url(#gradDark)" stroke-width="16" stroke-linecap="round" fill="none"/>
    
    <!-- Rungs -->
    <line x1="-80" y1="150" x2="80" y2="150" stroke="#6366f1" stroke-width="14" stroke-linecap="round"/>
    <line x1="-80" y1="80" x2="80" y2="80" stroke="#7c3aed" stroke-width="14" stroke-linecap="round"/>
    <line x1="-80" y1="10" x2="80" y2="10" stroke="#8b5cf6" stroke-width="14" stroke-linecap="round"/>
    <line x1="-80" y1="-60" x2="80" y2="-60" stroke="#a78bfa" stroke-width="14" stroke-linecap="round"/>
    <line x1="-80" y1="-130" x2="80" y2="-130" stroke="#c4b5fd" stroke-width="14" stroke-linecap="round"/>
    
    <!-- Arrow pointing up -->
    <path d="M0 -180 L-25 -145 L-10 -145 L-10 -120 L10 -120 L10 -145 L25 -145 Z" fill="#fbbf24"/>
  </g>
  
  <!-- Accent circle -->
  <circle cx="400" cy="120" r="50" fill="#fbbf24" opacity="0.9"/>
  
  <!-- Small decorative elements -->
  <circle cx="100" cy="400" r="20" fill="#6366f1" opacity="0.5"/>
  <circle cx="450" cy="380" r="12" fill="#8b5cf6" opacity="0.4"/>
</svg>
